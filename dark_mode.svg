        ho: ["Host", ": .................................... ", "Europe, Ukraine"],
        ke: ["Kernel", ": ..................................... ", "Volyn, Lutsk"],
        ide: ["IDE", ": ................................... ", "Lazy nvim v0.11.2"],
        
