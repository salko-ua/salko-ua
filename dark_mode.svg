        co: ["Langs.Computer", ": .................... ", "HTML, CSS, JSON, YAML"],
        ma: ["Languages.Main", ": ........... ", "Ukrainian(Native), English(B2)"],
        ad: ["languages.Additional", ": ....................... ", "Japanese(n5)"],
        sw: ["Hobbies.Software", ": ................... ", "Private pet projects"],
        ga: ["Hobbies.Games", ": .......................... ", "Collecting games"],
        
        gm: ["Email.Gmail", ": .................. ", "salo.lard.tocino@gmail.com"],
        me: ["Email.Me", ": ................................. ", "me@salko-ua.de"],
        wo: ["Email.Work", ": ............................. ", "work@salko-ua.de"],
