<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" font-family="ConsolasFallback,Consolas,monospace" width="985px" height="550px" font-size="16px">
  <style>
    @font-face {
      src: local('Consolas'), local('Consolas Bold');
      font-family: 'ConsolasFallback';
      font-display: swap;
    }
    .ascii { font-family: 'ConsolasFallback', monospace; font-size: 16px; white-space: pre; }
    .key { fill: #ff7b72; font-family: 'ConsolasFallback', monospace; font-size: 16px; }
    .value { fill: #a5d6ff; font-family: 'ConsolasFallback', monospace; font-size: 16px; }
    .cc { fill: #6e7681; font-family: 'ConsolasFallback', monospace; font-size: 16px; }
    .addColor { fill: #3fb950; }
    .delColor { fill: #f85149; } 

    #sa_part { fill: url(#grad-blue); filter: drop-shadow(0 0 5px rgba(0, 100, 255, 0.5)); }
    #lo_part { fill: url(#grad-yellow); filter: drop-shadow(0 0 5px rgba(255, 200, 0, 0.5)); }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.4; }
      50% { transform: translateY(-5px) scale(1.2); opacity: 0.8; }
    }
    .particle { animation: float 3s infinite ease-in-out; }
  </style>

  <defs>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0044ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-yellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f2cc60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc00;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="985px" height="550px" fill="#161b22" rx="15"/>

