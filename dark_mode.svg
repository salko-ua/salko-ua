      };

      const set = (id, txt) => { const el = document.getElementById(id); if(el) el.textContent = txt; };

      set('v_user', d.user); set('h_main', d.h_main);
      set('h_con', d.h_con); set('h_con_line', d.h_con_l);
      set('h_git', d.h_git); set('h_git_line', d.h_git_l);
      set('h_footer', d.h_foot);

      [['os',d.os],['up',d.up],['ho',d.ho],['ke',d.ke],['ide',d.ide],['pr',d.pr],['co',d.co],['ma',d.ma],['ad',d.ad],['sw',d.sw],['ga',d.ga],['gm',d.gm],['me',d.me],['wo',d.wo],['si',d.si],['di',d.di],['re',d.re],['st',d.st],['cm',d.cm],['fo',d.fo],['li',d.li]].forEach(x => {
        set('k_'+x[0], x[1][0]); set('d_'+x[0], x[1][1]); set('v_'+x[0], x[1][2]);
      });

      set('v_la', d.la); set('v_ld', d.ld);
